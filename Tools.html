<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Tools</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f1f1f1;
            overflow: hidden;
        }

        /* Navbar */
        .navbar{
            position: relative;
            z-index: 10;
        }

        /* 主布局 */
        .main-layout{
            display: flex;
            height: calc(100vh - 56px);
        }

        /* Sidebar */
        .sidebar{
            width: 0;
            overflow: hidden;
            transition: 0.3s;
            background: white;
            border-right: 1px solid #ddd;
        }

        /* Sidebar 展开 */
        .sidebar.active{
            width: 300px;
            padding: 20px;
        }

        /* 工具按钮 */
        .tool-btn{
            width: 100%;
            margin-bottom: 10px;
            text-align: left;
        }

        /* 右边区域 */
        .content-area{
            flex: 1;
            position: relative;
            
        }

        /* 初始选择页面 */
        .selection-screen{
            position: absolute;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            background: #f1f1f1;

            z-index: 1;
        }

        /* iframe */
        iframe{
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: white;
        }

    </style>

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">

        <div class="container">

            <!-- Website Title -->
            <a class="navbar-brand fw-bold" href="index.html">
                My Personal WebPage
            </a>

            <!-- Menu -->
            <div class="navbar-nav ms-auto">

                <!-- Home -->
                <a class="nav-link" href="index.html">
                    Home
                </a>

                <!-- Personal Info -->
                <a class="nav-link" href="PersonalInfo.html">
                    Personal Information
                </a>

                <!-- Tools -->
                <div class="btn-group">

                    <!-- 左边 -->
                    <a href="Tools.html"
                       class="nav-link active">

                        Useful Tools

                    </a>

                    <!-- 右边 Dropdown -->
                    <a class="nav-link dropdown-toggle dropdown-toggle-split"
                       data-bs-toggle="dropdown"
                       href="#">

                    </a>

                    <!-- Dropdown Menu -->
                    <ul class="dropdown-menu">

                        <li>
                            <a class="dropdown-item"
                               href="#"
                               onclick="openTool('Simple Calculator Program.html')">

                               Simple Calculator 

                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item"
                               href="#"
                               onclick="openTool('BMI Checker.html')">

                                BMI Checker

                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item"
                               href="#"
                               onclick="openTool('Income Tax Calculator.html')">

                                Income Tax Calculator

                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item"
                               href="#"
                               onclick="openTool('Unit Converter.html')">

                                Unit Converter

                            </a>
                        </li>

                    </ul>

                </div>

            </div>

        </div>

    </nav>

    <!-- Main -->
    <div class="main-layout">

        <!-- Sidebar -->
        <div class="sidebar"
             id="sidebar">

            <!-- 返回菜单 -->
            <button class="btn btn-dark tool-btn"
                    onclick="backToMenu()">

                Tools Menu

            </button>

            <hr>

            <!-- 工具 -->
            <button class="btn btn-danger tool-btn"
                    onclick="openTool('Simple Calculator Program.html')">

                Simple Calculator 

            </button>

            <button class="btn btn-primary tool-btn"
                    onclick="openTool('BMI Checker.html')">

                BMI Checker

            </button>

            <button class="btn btn-success tool-btn"
                    onclick="openTool('Income Tax Calculator.html')">

                Income Tax Calculator

            </button>

            <button class="btn btn-secondary tool-btn"
                    onclick="openTool('Unit Converter.html')">

                Unit Converter

            </button>

        </div>

        <!-- Content -->
        <div class="content-area">

            <!-- 初始选择页面 -->
            <div class="selection-screen"
                 id="selectionScreen">

                <div class="container" style="max-width: 500px;">

                <div class="card shadow border-0 rounded-4 p-5 text-center">

                    <h2 class="mb-3 d-grid gap-2 justify-content-center">
                        Select A Tool
                    </h2>

                    <div class="mb-3 d-grid gap-2 justify-content-center">

                    <button class="btn btn-danger mb-3"
                    style="width: 220px;"
                            onclick="openTool('Simple Calculator Program.html')">

                        Simple Calculator

                    </button>

                    <button class="btn btn-primary mb-3"
                    style="width: 220px;"
                            onclick="openTool('BMI Checker.html')">

                       BMI Checker

                    </button>

                    <button class="btn btn-success mb-3"
                    style="width: 220px;"
                            onclick="openTool('Income Tax Calculator.html')">

                        Income Tax Calculator

                    </button>

                    <button class="btn btn-secondary"
                    style="width: 220px;"
                            onclick="openTool('Unit Converter.html')">

                        Unit Converter

                    </button>

                    </div>

                </div>

                </div>

                </div>

            </div>

            <!-- iframe -->
            <iframe id="toolFrame"></iframe>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

   <script>

    // 打开工具
    function openTool(page){

        // Sidebar 展开
        document.getElementById("sidebar")
                .classList.add("active");

        // 隐藏选择页面
        document.getElementById("selectionScreen")
                .style.display = "none";

        // iframe
        let frame = document.getElementById("toolFrame");

        // 显示 iframe
        frame.style.display = "block";

        // 加载网页
        frame.src = page;

    }

    // 返回菜单
    function backToMenu(){

        // Sidebar 收回
        document.getElementById("sidebar")
                .classList.remove("active");

        // 显示选择页面
        document.getElementById("selectionScreen")
                .style.display = "flex";

        // 隐藏 iframe
        document.getElementById("toolFrame")
                .style.display = "none";

    }

    // 自动读取 dropdown 点击的工具
    window.onload = function(){

        let tool = sessionStorage.getItem("tool");

        if(tool){

            openTool(tool);

            // 用完删除
            sessionStorage.removeItem("tool");

        }

    }

</script>

</body>

</html>
