<!DOCTYPE html>
<html>
<head>
    <title>Unit Converter</title>
</head>

<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .main-content{
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body{
            background-color: #f1f1f1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            
        }

        .label{
            font-weight: bold;
            color: black;
        }

        .text{
            font-size: 13px;
            
        }

        input{
            width: 200px;
           text-align: center;
           
        }
    </style>


<body>

    <div class="main-content">
        <div class="container" style="max-width: 600px;" >
            <div class="card shadow border-0 rounded-4 px-5 py-5">

                <div class="text-center bg-white">
                    <h2 class="label">Unit Converter</h2>
                </div>

        <div class="mb-3 d-flex justify-content-center align-item-center gap-2 bg-white">
            <input type="number" id="value" placeholder="Enter value">
        </div>

        <div class="mb-3 d-flex justify-content-center align-item-center gap-2 bg-white">
            <select id="conversion" style="width: 200px; text-align: center;">
            <option value="cmToM">cm to metre</option>
            <option value="mToCm">metre to cm</option>
            <option value="mToKm">metre to km</option>
            <option value="kmToM">km to metre</option>
        </select>

        </div>

        <div class="mb-3 d-flex justify-content-center align-item-center gap-2 bg-white">
            <button class="btn btn-primary" onclick="convertUnit()">Convert</button>

        
        </div> 
        
        <div class="mb-3 d-flex justify-content-center align-item-center gap-2 bg-white">
        <h3 id="result"></h3>
        </div>
        

        </div>

        
    </div>
        </div>
    </div>


    <script>

        function convertUnit(){

            let value = document.getElementById("value").value;
            let conversion = document.getElementById("conversion").value;

            let result = 0;

            if(conversion == "cmToM"){
                result = value / 100;
                document.getElementById("result").innerHTML =
                value + " cm = " + result + " metre";
            }

            else if(conversion == "mToCm"){
                result = value * 100;
                document.getElementById("result").innerHTML =
                value + " metre = " + result + " cm";
            }

            else if(conversion == "mToKm"){
                result = value / 1000;
                document.getElementById("result").innerHTML =
                value + " metre = " + result + " km";
            }

            else if(conversion == "kmToM"){
                result = value * 1000;
                document.getElementById("result").innerHTML =
                value + " km = " + result + " metre";
            }

        }

    </script>

</body>
</html>
