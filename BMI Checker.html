<!DOCTYPE html>
<html>
<head>
    <title>BMI Checker</title>
</head>

<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .main-content{
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body{
            background-color: #f1f1f1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            
        }

        .label{
            font-weight: bold;
            color: black;
        }

        .text{
            font-size: 13px;
            
        }

        input{
            width: 200px;
           text-align: center;
           
        }

    </style>


<body>

    <div class="main-content">
        <div class="container" style="max-width: 600px;" >
            <div class="card shadow border-0 rounded-4 px-5 py-5">

        <div class="text-center bg-white">
            <h2 class="label">BMI Checker</h2>
        </div>

        <div class="mb-3 d-flex justify-content-center align-item-center gap-2">
        <input type="number" id="weight" placeholder="Enter weight (kg)">
        </div>

        <div class="mb-3 d-flex justify-content-center align-item-center gap-2">
             <input type="number" id="height" placeholder="Enter height (m)">
        </div>

       <div class="mb-3 d-flex justify-content-center align-item-center gap-2">
        <button class="btn btn-primary" onclick="checkBMI()">Check BMI</button>
       </div>

        
        <div class="mb-3 d-flex justify-content-center align-item-center gap-2">
        <h3 id="result"></h3>
        </div>
        
    </div>
     </div>
      </div>

    <script>
        function checkBMI(){

            let weight = document.getElementById("weight").value;
            let height = document.getElementById("height").value;

            let bmi = weight / (height * height);

            bmi = bmi.toFixed(2);

            let status = "";

            if(bmi < 18.5){
                status = "Underweight";
            }
            else if(bmi >= 18.5 && bmi < 25){
                status = "Normal";
            }
            else if(bmi >= 25 && bmi < 30){
                status = "Overweight";
            }
            else{
                status = "Obese";
            }

            document.getElementById("result").innerHTML =
            "Your BMI is " + bmi + " (" + status + ")";
        }
    </script>

</body>
</html>
