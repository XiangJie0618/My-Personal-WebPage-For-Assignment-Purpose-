<!DOCTYPE html>
<html>
<head>
    <title>Income Tax Calculator</title>
</head>

<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .main-content{
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body{
            background-color: #f1f1f1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            
        }

        .label{
            font-weight: bold;
            color: black;
        }

        .text{
            font-size: 13px;
            
        }

        input{
            width: 100px;
           text-align: center;
           
        }
        </style>


<body>

    <div class="main-content">
        <div class="container" style="max-width: 600px;">
            <div class="card shadow border-0 rounded-4 px-5 py-5">

                <div class="text-center bg-white">
                    <h2 class="label">Income Tax Calculator</h2>
                </div>

                <div class="mb-3 d-flex justify-content-center align-item-center gap-2 bg-white">
                <label>Yearly Income:</label>
                <input type="number" id="income" style="color: black;">
                </div> 

                <div class="mb-3 d-flex justify-content-center align-item-center gap-2 bg-white">
                <button class="btn btn-primary" onclick="calculateTax()">Calculate</button>
                </div>

                <div class="mb-3 d-flex justify-content-center align-item-center gap-2">
                <div id="result"></div>
                </div>
            </div>
        </div>
    </div>

<script>

function calculateTax() {

    let income = parseFloat(document.getElementById("income").value);

    let tax = 0;

    // Check empty input
    if (isNaN(income) || income < 0) {
        document.getElementById("result").innerHTML =
        "Please enter a valid income.";
        return;
    }

    // Category A
    if (income <= 5000) {
        tax = 0;
    }

    // Category B
    else if (income <= 20000) {
        tax = (income - 5000) * 0.01;
    }

    // Category C
    else if (income <= 35000) {
        tax = 150 + (income - 20000) * 0.03;
    }

    // Category D
    else if (income <= 50000) {
        tax = 600 + (income - 35000) * 0.08;
    }

    // Category E
    else if (income <= 70000) {
        tax = 1800 + (income - 50000) * 0.13;
    }

    // Category F
    else if (income <= 100000) {
        tax = 4400 + (income - 70000) * 0.21;
    }

    // Category G
    else if (income <= 250000) {
        tax = 10700 + (income - 100000) * 0.24;
    }

    // Category H
    else if (income <= 400000) {
        tax = 46700 + (income - 250000) * 0.245;
    }

    // Category I
    else if (income <= 600000) {
        tax = 83450 + (income - 400000) * 0.25;
    }

    // Category J
    else if (income <= 1000000) {
        tax = 133450 + (income - 600000) * 0.26;
    }

    // Category K
    else if (income <= 2000000) {
        tax = 237450 + (income - 1000000) * 0.28;
    }

    // Category L
    else {
        tax = 517450 + (income - 2000000) * 0.30;
    }

    document.getElementById("result").innerHTML =
    "Tax Amount = RM " + tax.toFixed(2);
}

</script>

</body>
</html>
