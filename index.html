<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Home</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="mobile-style.css">

    <style>

        body{
            background-color: #f1f1f1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .label{
            font-weight: bold;
            color: black;
        }

        .main-content{
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

    </style>

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">

        <div class="container">

            <!-- Website Title -->
            <a class="navbar-brand fw-bold" href="index.html">
                My Personal WebPage
            </a>

            <!-- Menu -->
            <div class="navbar-nav ms-auto">

                <!-- Home -->
                <a class="nav-link active" href="index.html">
                    Home
                </a>

                <!-- Personal Info -->
                <a class="nav-link" href="PersonalInfo.html">
                    Personal Information
                </a>

                <!-- Tools -->
                <div class="btn-group">

                    <!-- 左边 -->
                    <a href="Tools.html"
                       class="nav-link">

                        Useful Tools

                    </a>

                    <!-- 右边 Dropdown -->
                    <a class="nav-link dropdown-toggle dropdown-toggle-split"
                       data-bs-toggle="dropdown"
                       href="#">
                    </a>

                    <!-- Dropdown Menu -->
                    <ul class="dropdown-menu">

                        <li>
                            <a class="dropdown-item"
                               href="Tools.html"
                               onclick="sessionStorage.setItem('tool','Simple Calculator Program.html')">

                                Simple Calculator 

                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item"
                               href="Tools.html"
                               onclick="sessionStorage.setItem('tool','BMI Checker.html')">

                                BMI Checker

                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item"
                               href="Tools.html"
                               onclick="sessionStorage.setItem('tool','Income Tax Calculator.html')">

                                Income Tax Calculator

                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item"
                               href="Tools.html"
                               onclick="sessionStorage.setItem('tool','Unit Converter.html')">

                                Unit Converter

                            </a>
                        </li>

                    </ul>

                </div>

            </div>

        </div>

    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Main Content -->
    <div class="main-content">

        <div class="container" style="max-width: 500px;">

            <div class="card shadow border-0 rounded-4">

                <div class="text-center bg-white" style="margin:30px">
                    <h2 class="label">Welcome</h2>
                </div>

                <div class="text-center" style="padding: 4px;">

                    <a href="PersonalInfo.html">

                        <button type="button"
                                class="btn btn-primary"
                                style="width: 200px;">

                            <b>Personal Info</b>

                        </button>

                    </a>

                </div>

                <div class="text-center"
                     style="padding: 4px; margin-bottom: 30px;">

                    <a href="Tools.html">

                        <button type="button"
                                class="btn"
                                style="background-color: green;
                                       color: white;
                                       width: 200px;">

                            <b>Tools</b>

                        </button>

                    </a>

                </div>

            </div>

        </div>
